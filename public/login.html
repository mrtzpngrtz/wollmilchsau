<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMESAMEBUTDIFFERENT — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="brand-row">
          <span class="brand-mark">●</span>
          <span class="brand-name">SAMESAMEBUTDIFFERENT</span>
        </div>
        <div class="brand-sub">INFINITE CANVAS</div>
      </div>

      <!-- Tabs -->
      <div class="login-tabs">
        <button class="login-tab active" data-tab="login">
          <span class="tab-idx">01</span> LOGIN
        </button>
        <button class="login-tab" data-tab="register">
          <span class="tab-idx">02</span> REGISTER
        </button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input type="text" id="login-username" class="form-input" placeholder="Enter username..." autocomplete="username" autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter password..." autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="form-submit">LOGIN →</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="login-form hidden">
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input type="text" id="reg-username" class="form-input" placeholder="Choose a username..." autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label">DISPLAY NAME</label>
          <input type="text" id="reg-displayname" class="form-input" placeholder="Your display name (optional)..." />
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" id="reg-password" class="form-input" placeholder="Choose a password..." autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label">CONFIRM PASSWORD</label>
          <input type="password" id="reg-password2" class="form-input" placeholder="Confirm password..." autocomplete="new-password" />
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <button type="submit" class="form-submit">CREATE ACCOUNT →</button>
      </form>

      <!-- 2FA Step -->
      <div id="twofa-step" class="login-form hidden">
        <div class="form-group">
          <label class="form-label">AUTHENTICATOR CODE</label>
          <input type="text" id="twofa-code" class="form-input" placeholder="000 000"
            inputmode="numeric" autocomplete="one-time-code" maxlength="7" />
        </div>
        <div id="twofa-error" class="form-error hidden"></div>
        <button type="button" id="twofa-submit" class="form-submit">VERIFY →</button>
        <div style="margin-top:12px;text-align:center">
          <button type="button" id="twofa-back" style="background:none;border:none;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--dark-grey);cursor:pointer;text-decoration:underline;">← BACK TO LOGIN</button>
        </div>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <span class="footer-coord">48°08'N</span>
        <span class="footer-sep">·</span>
        <span class="footer-coord">11°34'E</span>
      </div>
    </div>
  </div>

  <script>
    /* === LOGIN / REGISTER === */
    // Hide register tab if registration is disabled
    fetch('/api/config/public').then(r => r.json()).then(cfg => {
      if (!cfg.registrationEnabled) {
        document.querySelector('.login-tab[data-tab="register"]').style.display = 'none';
      }
    }).catch(() => {});

    const tabs = document.querySelectorAll('.login-tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (tab.dataset.tab === 'login') {
          loginForm.classList.remove('hidden');
          registerForm.classList.add('hidden');
        } else {
          loginForm.classList.add('hidden');
          registerForm.classList.remove('hidden');
        }
        clearErrors();
      });
    });

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.classList.add('hidden');
        el.textContent = '';
      });
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    // 2FA step
    const twofaStep = document.getElementById('twofa-step');
    const twofaCode = document.getElementById('twofa-code');
    const twofaError = document.getElementById('twofa-error');

    function showTwoFa() {
      loginForm.classList.add('hidden');
      document.querySelector('.login-tabs').classList.add('hidden');
      twofaStep.classList.remove('hidden');
      twofaCode.value = '';
      twofaCode.focus();
    }

    function hideTwoFa() {
      twofaStep.classList.add('hidden');
      document.querySelector('.login-tabs').classList.remove('hidden');
      loginForm.classList.remove('hidden');
      twofaError.classList.add('hidden');
    }

    document.getElementById('twofa-back').addEventListener('click', () => hideTwoFa());

    // Format code input as "000 000"
    twofaCode.addEventListener('input', () => {
      let v = twofaCode.value.replace(/\D/g, '').slice(0, 6);
      if (v.length > 3) v = v.slice(0, 3) + ' ' + v.slice(3);
      twofaCode.value = v;
    });

    async function submitTwoFa() {
      const code = twofaCode.value.replace(/\s/g, '');
      if (code.length !== 6) {
        twofaError.textContent = 'Enter the 6-digit code';
        twofaError.classList.remove('hidden');
        return;
      }
      twofaError.classList.add('hidden');
      try {
        const res = await fetch('/api/auth/2fa/verify-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else if (res.status === 400 && data.error && data.error.includes('pending')) {
          window.location.href = '/login';
        } else {
          twofaError.textContent = data.error || 'Invalid code';
          twofaError.classList.remove('hidden');
          twofaCode.value = '';
          twofaCode.focus();
        }
      } catch (err) {
        twofaError.textContent = 'Connection error';
        twofaError.classList.remove('hidden');
      }
    }

    document.getElementById('twofa-submit').addEventListener('click', submitTwoFa);
    twofaCode.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitTwoFa(); });

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      if (!username || !password) {
        showError('login-error', 'Please fill in all fields');
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else if (data.requiresTwoFactor) {
          showTwoFa();
        } else {
          showError('login-error', data.error || 'Login failed');
        }
      } catch (err) {
        showError('login-error', 'Connection error');
      }
    });

    // Register
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const username = document.getElementById('reg-username').value.trim();
      const displayName = document.getElementById('reg-displayname').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;

      if (!username || !password) {
        showError('register-error', 'Username and password are required');
        return;
      }
      if (password !== password2) {
        showError('register-error', 'Passwords do not match');
        return;
      }
      if (password.length < 3) {
        showError('register-error', 'Password must be at least 3 characters');
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, displayName }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          showError('register-error', data.error || 'Registration failed');
        }
      } catch (err) {
        showError('register-error', 'Connection error');
      }
    });
  </script>
</body>
</html>
